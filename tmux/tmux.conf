# ---- General ----------------------------------------------------------------------
set -g mouse on
set -sg escape-time 10        # reduce Esc-key lag inside Neovim
set -g history-limit 10000
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

# ---- Color / truecolor --------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ---- Copy mode (vi-style, matches Neovim muscle memory) -----------------------------
setw -g mode-keys vi

# ---- Reload config -------------------------------------------------------------------
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

# ---- smart-splits.nvim integration ----------------------------------------------------
# '@pane-is-vim' is a pane-local option set by smart-splits.nvim on load, and unset
# when Neovim exits/suspends. Lets <C-hjkl> move seamlessly between tmux panes and
# Neovim splits without needing to think about which one you're currently in.
bind-key -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l' 'select-pane -R'

# Same idea for resizing with Alt+hjkl, matching the Neovim-side keymaps.
bind-key -n M-h if -F "#{@pane-is-vim}" 'send-keys M-h' 'resize-pane -L 3'
bind-key -n M-j if -F "#{@pane-is-vim}" 'send-keys M-j' 'resize-pane -D 3'
bind-key -n M-k if -F "#{@pane-is-vim}" 'send-keys M-k' 'resize-pane -U 3'
bind-key -n M-l if -F "#{@pane-is-vim}" 'send-keys M-l' 'resize-pane -R 3'
